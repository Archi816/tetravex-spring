<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/tile.css">
</head>
<body>
<div class="wrapper">
  <section class="page">
    <div class="page-wrapper">
      <div class="container">
        <div class="tile">
          <div class="tile-container">
            <div class="tile-block">
              <div class="tile-top tile-part">
                <p class="tile-number"></p>
              </div>
              <div class="flex-between">
                <div class="tile-left tile-part">
                  <p class="tile-number"></p>
                </div>
                <div class="tile-right tile-part">
                  <p class="tile-number"></p>
                </div>
              </div>
              <div class="tile-bottom tile-part">
                <p class="tile-number"></p>
              </div>
            </div>
            <span class="left-divider"></span>
            <span class="right-divider"></span>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
</body>
</html>
